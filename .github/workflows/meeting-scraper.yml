name: Civic Meeting Scraper

on:
  schedule:
    # Run at 2:00 AM PST (10:00 AM UTC) every day
    - cron: '0 10 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write # Needed to commit the updated JSON file back to the repo

jobs:
  scrape-meetings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pypdf

      - name: Run Scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          ALERTS_CSV_URL: ${{ secrets.ALERTS_CSV_URL }}
        run: |
          python scrape_meetings.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add meetings_ai.json
          git commit -m "Automated update: Civic Meetings JSON" || exit 0
          git push
